site_name: Oxidant
site_description: Agentic TypeScript-to-Rust translation harness
repo_url: https://github.com/ByteBard97/oxidant
repo_name: ByteBard97/oxidant

docs_dir: docs/pages

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/diagram-zoom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Overview: index.md
  - Pipeline:
    - Phase A — Analysis: pipeline/phase-a.md
    - Class Hierarchies: pipeline/hierarchies.md
    - Phase B — Translation Loop: pipeline/phase-b.md
    - Verification: pipeline/verification.md
    - Phase C — Refinement: pipeline/phase-c.md
  - Reference:
    - Data Store: reference/data-store.md
    - Idiom Detection: reference/idioms.md
    - CLI: reference/cli.md
  - Research: research.md
